spring.application.name=tonefit

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# RDS 운영 안정성: 풀 수명 < RDS/네트워크 LB idle 한계
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=1700000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.json_format_mapper=jackson
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

# 배포·재시작 시 in-flight 요청 보호 (Gemini 호출이 8~15초 소요됨)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.jackson.property-naming-strategy=SNAKE_CASE

# ALB/외부 헬스체크용. 그 외 actuator endpoint는 노출 안 함
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

ai.provider=stub
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-3-flash-preview
gemini.base-url=https://generativelanguage.googleapis.com/v1beta

amplitude.enabled=${AMPLITUDE_ENABLED:false}
amplitude.api-key=${AMPLITUDE_API_KEY:}
amplitude.base-url=https://api2.amplitude.com
