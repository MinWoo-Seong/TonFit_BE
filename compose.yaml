services:
  postgres:
    image: postgres:16
    container_name: tonefit-postgres
    environment:
      POSTGRES_DB: tonefit
      POSTGRES_USER: tonefit
      POSTGRES_PASSWORD: tonefit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tonefit -d tonefit"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
